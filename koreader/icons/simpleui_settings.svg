<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="48" height="48" viewBox="0 0 48 48">
  <!-- slider esquerdo: linha vertical com círculo a 2/3 de cima -->
  <line style="fill:none;stroke:#000000;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;stroke-opacity:1" x1="12" y1="6" x2="12" y2="42"/>
  <circle style="fill:#ffffff;stroke:#000000;stroke-width:2;stroke-opacity:1" cx="12" cy="30" r="4.5"/>
  <!-- slider central: linha vertical com círculo a 1/3 de cima -->
  <line style="fill:none;stroke:#000000;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;stroke-opacity:1" x1="24" y1="6" x2="24" y2="42"/>
  <circle style="fill:#ffffff;stroke:#000000;stroke-width:2;stroke-opacity:1" cx="24" cy="18" r="4.5"/>
  <!-- slider direito: linha vertical com círculo a meio -->
  <line style="fill:none;stroke:#000000;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;stroke-opacity:1" x1="36" y1="6" x2="36" y2="42"/>
  <circle style="fill:#ffffff;stroke:#000000;stroke-width:2;stroke-opacity:1" cx="36" cy="24" r="4.5"/>
</svg>
